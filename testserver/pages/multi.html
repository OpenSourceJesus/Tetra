<!DOCTYPE html>
<html>
<head>
  <title>Multi handler test</title>
  <script>
  function hello() {
    alert('hello');
  }
  function goodbye() {
    alert('goodbye');
  }
  </script>
</head>
<body>
  <h1>Multiple handlers</h1>
  <button onclick="hello()">Hello</button>
  <button onclick="goodbye()">Goodbye</button>
</body>
</html>
